<!DOCTYPE html>

<html lang="zh-TW">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no"/>
<title>法官的修仙退休路 - 台灣雲林地方法院</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{background:#1c1917;color:#e7e5e4;font-family:"PingFang TC","Noto Sans TC","Microsoft JhengHei",sans-serif;min-height:100vh;font-size:18px;line-height:1.6}
button,input{font-family:inherit;font-size:inherit;border:none;outline:none;-webkit-appearance:none}
button{cursor:pointer}

/* Loading */
#loading{position:fixed;inset:0;background:#1c1917;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;z-index:999}
.ld-icon{font-size:60px;animation:spin 2s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.ld-title{font-size:24px;font-weight:900;color:#d4a853}
.ld-sub{font-size:15px;color:#78716c}

/* Stat bars */
.stats-wrap{position:sticky;top:0;z-index:20;background:rgba(0,0,0,0.85);backdrop-filter:blur(8px);border-bottom:1px solid rgba(255,255,255,0.1);padding:12px 16px}
.stats-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.stats-title{font-size:15px;font-weight:700;color:#d6d3d1;font-family:monospace}
.player-badge{font-size:13px;background:rgba(180,83,9,0.4);border:1px solid rgba(217,119,6,0.4);color:#fcd34d;padding:3px 10px;border-radius:999px;font-weight:600}
.mute-btn{font-size:20px;background:rgba(255,255,255,0.1);border:none;border-radius:8px;padding:4px 8px;color:white}
.stats-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px 20px}
.stat-row{display:flex;flex-direction:column;gap:5px}
.stat-label{display:flex;justify-content:space-between;font-size:15px;font-weight:600;color:#d6d3d1}
.stat-val{font-weight:700;font-family:monospace;font-size:15px}
.stat-val.low{color:#f87171;animation:pulse 1s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.4}}
.bar-bg{height:12px;background:#292524;border-radius:999px;overflow:hidden;border:1px solid #44403c}
.bar-fill{height:100%;border-radius:999px;transition:width 0.6s ease}

/* Main content */
.main{max-width:640px;margin:0 auto;padding:20px 16px;display:flex;flex-direction:column;gap:20px}

/* Chapter header */
.chap-header{display:flex;align-items:center;gap:16px}
.chap-scene{font-size:48px}
.chap-num{font-size:13px;color:#78716c;font-family:monospace;margin-bottom:4px}
.chap-title{font-size:22px;font-weight:900;color:#f5f5f4;line-height:1.3}

/* Story box */
.story-box{background:rgba(0,0,0,0.4);border:1px solid rgba(255,255,255,0.1);border-radius:16px;padding:24px;font-size:18px;line-height:1.8;color:#d6d3d1;white-space:pre-wrap}

/* Result box */
.result-emoji{font-size:36px;flex-shrink:0}
.result-text{font-size:18px;line-height:1.8;color:#d6d3d1;white-space:pre-wrap}
.result-row{display:flex;gap:12px;align-items:flex-start}
.delta-wrap{display:flex;flex-wrap:wrap;gap:8px;padding:12px 0;border-top:1px solid rgba(255,255,255,0.1);border-bottom:1px solid rgba(255,255,255,0.1);margin:12px 0}
.delta-chip{font-size:15px;font-weight:700;padding:6px 12px;border-radius:999px;border-width:1px;border-style:solid}
.delta-pos{color:#86efac;background:rgba(21,128,61,0.2);border-color:rgba(34,197,94,0.4)}
.delta-neg{color:#fca5a5;background:rgba(153,27,27,0.2);border-color:rgba(239,68,68,0.4)}
.law-box{background:rgba(120,53,15,0.3);border:1px solid rgba(217,119,6,0.3);border-radius:12px;padding:16px}
.law-title{color:#fbbf24;font-size:15px;font-weight:900;font-family:monospace;margin-bottom:6px}
.law-text{color:rgba(253,230,138,0.8);font-size:15px;line-height:1.7}

/* Choices */
.choices{display:flex;flex-direction:column;gap:12px}
.choice-btn{width:100%;text-align:left;background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.15);border-radius:16px;padding:16px 20px;display:flex;gap:16px;align-items:flex-start;transition:all 0.2s;color:#d6d3d1;font-size:18px;line-height:1.6}
.choice-btn:active{transform:scale(0.98);background:rgba(255,255,255,0.12)}
.choice-label{font-size:18px;font-weight:900;font-family:monospace;color:#78716c;flex-shrink:0;margin-top:2px;width:20px}

/* Next button */
.next-btn{width:100%;background:rgba(180,83,9,0.5);border:1px solid rgba(217,119,6,0.4);color:#fef3c7;border-radius:16px;padding:16px;font-size:18px;font-weight:700;transition:all 0.2s}
.next-btn:active{transform:scale(0.99)}

/* Title screen */
.title-screen{min-height:100vh;background:linear-gradient(135deg,#1c1917,#18181b,#451a03);display:flex;align-items:center;justify-content:center;padding:24px}
.title-card{max-width:480px;width:100%;text-align:center;display:flex;flex-direction:column;gap:24px}
.title-icon{font-size:72px}
.title-label{font-size:15px;font-family:monospace;letter-spacing:4px;color:#d4a853}
.title-main{font-size:48px;font-weight:900;color:white;line-height:1.2}
.title-sub{font-size:13px;color:#78716c;letter-spacing:2px}
.title-desc{font-size:17px;color:#78716c;line-height:1.7}
.name-box{background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.15);border-radius:16px;padding:20px;text-align:left;display:flex;flex-direction:column;gap:10px}
.name-label{font-size:16px;font-weight:700;color:#fbbf24}
.name-input{width:100%;background:rgba(0,0,0,0.3);border:1px solid rgba(255,255,255,0.2);border-radius:12px;padding:12px 16px;color:white;font-size:18px}
.name-input:focus{border-color:#fbbf24}
.name-error{color:#f87171;font-size:14px}
.hint-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;border:1px solid #44403c;border-radius:12px;padding:16px;font-size:14px;color:#78716c}
.start-btn{width:100%;padding:20px;background:#b45309;color:white;border-radius:16px;font-size:20px;font-weight:900;box-shadow:0 8px 24px rgba(180,83,9,0.4);transition:all 0.2s}
.start-btn:active{transform:scale(0.97)}
.footer{font-size:13px;color:#44403c;font-family:monospace}

/* Endings */
.ending-screen{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px}
.ending-card{max-width:560px;width:100%;text-align:center;display:flex;flex-direction:column;gap:20px}
.ending-emoji{font-size:80px;animation:bonce 1s ease-in-out infinite}
@keyframes bonce{0%,100%{transform:translateY(-15%)}50%{transform:translateY(0)}}
.ending-title{font-size:36px;font-weight:900;color:white;line-height:1.3}
.ending-name{font-size:18px;font-weight:700;color:#fbbf24}
.ending-text{font-size:17px;color:#d6d3d1;line-height:1.8;white-space:pre-wrap;text-align:left}
.ending-law{border-top:1px solid rgba(255,255,255,0.2);padding-top:16px;font-size:14px;color:#78716c;font-style:italic}
.gift-box{background:rgba(251,191,36,0.1);border:2px solid rgba(251,191,36,0.4);border-radius:20px;padding:24px;cursor:pointer;transition:all 0.2s;text-align:center}
.gift-box:active{transform:scale(0.97)}
.gift-icon{font-size:40px;margin-bottom:8px}
.gift-title{font-size:20px;font-weight:900;color:#fbbf24;margin-bottom:6px}
.gift-name{font-size:15px;color:rgba(253,230,138,0.7);margin-bottom:8px;font-family:monospace}
.gift-text{font-size:17px;font-weight:600;color:#e7e5e4;line-height:1.6}
.gift-text b{color:white;text-decoration:underline;text-decoration-color:#fbbf24}
.restart-btn{padding:16px 32px;background:rgba(255,255,255,0.1);border:1px solid rgba(255,255,255,0.3);color:white;border-radius:12px;font-size:17px;font-weight:600;transition:all 0.2s}
.restart-btn:active{background:rgba(255,255,255,0.2)}

/* Admin */
.admin-screen{min-height:100vh;background:#0c0a09;padding:24px}
.admin-inner{max-width:640px;margin:0 auto;display:flex;flex-direction:column;gap:20px}
.admin-header{display:flex;justify-content:space-between;align-items:center}
.admin-court{font-size:13px;color:#fbbf24;font-family:monospace;margin-bottom:4px}
.admin-title{font-size:28px;font-weight:900}
.close-btn{padding:8px 16px;background:#292524;border-radius:12px;color:#d6d3d1;font-size:14px;font-weight:600}
.stat-cards{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}
.stat-card{background:#1c1917;border-radius:12px;padding:16px;text-align:center}
.stat-card-num{font-size:32px;font-weight:900}
.stat-card-label{font-size:13px;color:#78716c;margin-top:4px}
.record-header{display:grid;grid-template-columns:30px 1fr 1fr 80px;gap:8px;padding:0 16px 8px;font-size:12px;color:#78716c;font-family:monospace}
.record-row{display:grid;grid-template-columns:30px 1fr 1fr 80px;gap:8px;align-items:center;padding:12px 16px;border-radius:12px;border-width:1px;border-style:solid;font-size:15px;margin-bottom:8px}
.rec-good{background:rgba(21,128,61,0.1);border-color:rgba(34,197,94,0.3)}
.rec-neutral{background:rgba(120,53,15,0.1);border-color:rgba(217,119,6,0.3)}
.rec-bad{background:rgba(153,27,27,0.1);border-color:rgba(239,68,68,0.2)}
.rec-num{color:#78716c;font-size:13px}
.rec-name{font-weight:700;color:white}
.rec-ending-good{color:#86efac;font-weight:600;font-size:14px}
.rec-ending-neutral{color:#fbbf24;font-weight:600;font-size:14px}
.rec-ending-bad{color:#fca5a5;font-weight:600;font-size:14px}
.rec-time{color:#78716c;font-size:12px;font-family:monospace}
.empty-records{background:#1c1917;border-radius:16px;padding:40px;text-align:center;color:#78716c;font-size:17px}
.clear-btn{padding:10px 16px;background:#1c1917;border:1px solid #44403c;color:#78716c;border-radius:12px;font-size:14px}
.confirm-clear{display:flex;gap:12px;align-items:center}
.confirm-text{font-size:14px;color:#78716c}
.confirm-yes{padding:8px 16px;background:#b91c1c;color:white;border-radius:8px;font-size:14px;font-weight:700}
.confirm-no{padding:8px 16px;background:#292524;color:#d6d3d1;border-radius:8px;font-size:14px}
.no-records{color:#78716c;font-style:italic;font-size:15px;text-align:center;padding:20px}

/* Admin modal */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.8);display:flex;align-items:center;justify-content:center;z-index:100;padding:24px}
.modal-box{background:#1c1917;border:1px solid #44403c;border-radius:20px;padding:32px;width:100%;max-width:360px;display:flex;flex-direction:column;gap:16px}
.modal-title{font-size:20px;font-weight:900;color:white}
.modal-input{width:100%;background:rgba(0,0,0,0.4);border:1px solid #44403c;border-radius:12px;padding:12px 16px;color:white;font-size:17px}
.modal-input.error{border-color:#ef4444}
.modal-error{color:#f87171;font-size:14px}
.modal-btns{display:flex;gap:12px}
.modal-ok{flex:1;padding:12px;background:#b45309;color:white;border-radius:12px;font-size:16px;font-weight:700}
.modal-cancel{flex:1;padding:12px;background:#292524;color:#d6d3d1;border-radius:12px;font-size:16px;font-weight:700}

/* BG colors */
.bg1{background:linear-gradient(135deg,#451a03,#1c1917,#18181b)}
.bg2{background:linear-gradient(135deg,#0f172a,#18181b,#111827)}
.bg3{background:linear-gradient(135deg,#022c22,#134e4a,#083344)}
.bg4{background:linear-gradient(135deg,#450a0a,#881337,#500724)}
.bg5{background:linear-gradient(135deg,#2e1065,#4a044e,#1e1b4b)}
.bg6{background:linear-gradient(135deg,#082f49,#0c4a6e,#172554)}
.bg7{background:linear-gradient(135deg,#431407,#713f12,#450a0a)}
.bg8{background:linear-gradient(135deg,#1e1b4b,#0f172a,#18181b)}
.end-scoreZero{background:linear-gradient(135deg,#450a0a,#7f1d1d)}
.end-hpZero{background:linear-gradient(135deg,#0f172a,#1e293b)}
.end-guanxiZero{background:linear-gradient(135deg,#042f2e,#134e4a)}
.end-pendingMax{background:linear-gradient(135deg,#451a03,#713f12)}
.end-neutral{background:linear-gradient(135deg,#1e293b,#1e1b4b)}
.end-good{background:linear-gradient(135deg,#451a03,#1c1917,#18181b)}
.end-bad{background:linear-gradient(135deg,#450a0a,#7f1d1d)}
</style>

</head>
<body>

<div id="loading">
  <div class="ld-icon">⚖️</div>
  <div class="ld-title">法官的修仙退休路</div>
  <div class="ld-sub">台灣雲林地方法院</div>
</div>

<div id="app" style="display:none"></div>

<script>
// ── Storage ──
function saveRecord(r){try{let a=JSON.parse(localStorage.getItem("jp")||"[]");a.push(r);localStorage.setItem("jp",JSON.stringify(a));}catch(e){}}
function loadRecords(){try{return JSON.parse(localStorage.getItem("jp")||"[]");}catch(e){return[];}}
function clearRecords(){try{localStorage.removeItem("jp");}catch(e){}}

// ── Audio ──
const NOTE={A1:55,B1:61.7,C2:65.4,D2:73.4,E2:82.4,F2:87.3,G2:98,A2:110,B2:123.5,C3:130.8,D3:146.8,E3:164.8,F3:174.6,G3:196,A3:220,B3:246.9,C4:261.6,D4:293.7,E4:329.6,F4:349.2,G4:392,A4:440,B4:493.9,C5:523.3,D5:587.3,E5:659.3,G5:784};
const hz=k=>NOTE[k]||261.6;
let _ctx=null,_master=null,_bgStep=0,_muted=false,_started=false;
function gCtx(){if(!_ctx){_ctx=new(window.AudioContext||window.webkitAudioContext)();_master=_ctx.createGain();_master.gain.value=0.55;_master.connect(_ctx.destination);}return _ctx;}
function nt(f,t,w,d,v,det=0){const c=gCtx(),o=c.createOscillator(),g=c.createGain();o.type=t;o.frequency.value=f;if(det)o.detune.value=det;g.gain.setValueAtTime(0.0001,w);g.gain.linearRampToValueAtTime(v,w+0.04);g.gain.exponentialRampToValueAtTime(0.0001,w+d);o.connect(g);g.connect(_master);o.start(w);o.stop(w+d+0.1);}
function organ(f,w,d,v){nt(f,"sine",w,d,v);nt(f,"sine",w,d,v*0.5,7);nt(f*2,"sine",w,d,v*0.25);}
function pluck(f,w,v){const c=gCtx(),o=c.createOscillator(),g=c.createGain();o.type="triangle";o.frequency.value=f;g.gain.setValueAtTime(v,w);g.gain.exponentialRampToValueAtTime(0.0001,w+0.55);o.connect(g);g.connect(_master);o.start(w);o.stop(w+0.6);}
function drum(w,v=0.5){const c=gCtx(),o=c.createOscillator(),g=c.createGain();o.type="sine";o.frequency.setValueAtTime(120,w);o.frequency.exponentialRampToValueAtTime(40,w+0.18);g.gain.setValueAtTime(v,w);g.gain.exponentialRampToValueAtTime(0.0001,w+0.22);o.connect(g);g.connect(_master);o.start(w);o.stop(w+0.25);}
function gavel(w){const c=gCtx(),o=c.createOscillator(),g=c.createGain();o.type="sine";o.frequency.setValueAtTime(200,w);o.frequency.exponentialRampToValueAtTime(60,w+0.08);g.gain.setValueAtTime(0.47,w);g.gain.exponentialRampToValueAtTime(0.0001,w+0.12);o.connect(g);g.connect(_master);o.start(w);o.stop(w+0.15);const buf=c.createBuffer(1,c.sampleRate*0.04,c.sampleRate);const d=buf.getChannelData(0);for(let i=0;i<d.length;i++)d[i]=(Math.random()*2-1)*(1-i/d.length);const s=c.createBufferSource(),g2=c.createGain();s.buffer=buf;g2.gain.value=0.23;s.connect(g2);g2.connect(_master);s.start(w);}
const BEAT=0.83,Bb2=116.5,Bb3=233.1;
const BASS=[hz("D2"),hz("A2"),Bb2,hz("F2"),hz("C2"),hz("G2"),hz("A2"),hz("A2")];
const PADS=[[hz("D3"),hz("F3"),hz("A3")],[hz("A2"),hz("E3"),hz("A3")],[Bb2,Bb3*0.5,hz("F3")],[hz("F2"),hz("C3"),hz("F3")],[hz("C3"),hz("E3"),hz("G3")],[hz("G2"),hz("B2"),hz("D3")],[hz("A2"),hz("C3"),hz("E3")],[hz("A2"),hz("C3"),hz("E3")]];
const MEL=[hz("D4"),hz("F4"),hz("A4"),hz("G4"),hz("F4"),hz("E4"),hz("D4"),hz("C4"),hz("D4"),hz("E4"),hz("F4"),hz("A4"),hz("G4"),hz("F4"),hz("E4"),hz("D4")];
function bgStep(){if(!_started)return;const s=_bgStep++;if(!_muted){const c=gCtx(),now=c.currentTime,b=s%8;organ(BASS[b],now,BEAT*0.85,0.22);if(b%2===0)drum(now,0.35);if(s%8===0)gavel(now);if(b%2===0)PADS[Math.floor(b/2)%PADS.length].forEach(f=>organ(f,now,BEAT*1.8,0.09));pluck(MEL[s%16%MEL.length],now+BEAT*0.5,0.18);}setTimeout(bgStep,BEAT*1000);}
async function startAudio(){if(_started)return;_started=true;const c=gCtx();if(c.state==="suspended")await c.resume();bgStep();}
function toggleMute(){_muted=!_muted;if(_master)_master.gain.value=_muted?0:0.55;return _muted;}
function sfxClick(){if(!_started||_muted)return;gavel(gCtx().currentTime);}
function sfxGood(){if(!_started||_muted)return;const c=gCtx(),now=c.currentTime;[[hz("D4"),0],[hz("F4"),0.12],[hz("A4"),0.24],[hz("D5"),0.38]].forEach(([f,t])=>{nt(f,"square",now+t,0.45,0.28);nt(f,"sine",now+t,0.55,0.18);});[hz("D4"),hz("F4"),hz("A4"),hz("D5")].forEach(f=>organ(f,now+0.65,0.9,0.20));gavel(now+0.62);}
function sfxBad(){if(!_started||_muted)return;const c=gCtx(),now=c.currentTime;[[hz("A3"),0],[hz("F3"),0.18],[hz("D3"),0.38],[hz("A2"),0.6]].forEach(([f,t])=>{nt(f,"sawtooth",now+t,0.5,0.30);nt(f*0.5,"sine",now+t,0.5,0.20);});drum(now+0.85,0.65);}
function sfxNext(){if(!_started||_muted)return;const c=gCtx(),now=c.currentTime;gavel(now);[hz("D4"),hz("A4"),hz("D5")].forEach((f,i)=>nt(f,"sine",now+0.12+i*0.13,0.25,0.30));}
function sfxEnding(good){if(!_started||_muted)return;const c=gCtx(),now=c.currentTime;if(good){gavel(now);gavel(now+0.15);[{ch:[hz("G3"),hz("B3"),hz("D4")],t:0.3},{ch:[hz("A3"),hz("C4"),hz("E4")],t:1.0},{ch:[hz("D3"),hz("F3"),hz("A3")],t:1.7},{ch:[hz("D3"),hz("F3"),hz("A3"),hz("D4")],t:2.5}].forEach(({ch,t})=>ch.forEach(f=>organ(f,now+t,1.1,0.22)));}else{gavel(now);gavel(now+0.2);gavel(now+0.4);[hz("D2"),hz("A1"),hz("D2")].forEach((f,i)=>organ(f,now+0.5+i*0.6,1.0,0.28));nt(hz("D3"),"sawtooth",now+0.5,1.8,0.22);}}
function sfxCheer(){if(!_started||_muted)return;const c=gCtx(),now=c.currentTime;[[hz("C4"),0],[hz("E4"),0.12],[hz("G4"),0.24],[hz("C5"),0.38],[hz("E5"),0.52],[hz("G5"),0.66]].forEach(([f,t])=>{nt(f,"triangle",now+t,0.35,0.28);nt(f,"sine",now+t,0.45,0.14);});[hz("C5"),hz("E5"),hz("G5")].forEach(f=>organ(f,now+0.9,1.0,0.18));gavel(now+0.85);}

// ── Game Data ──
const CHAPTERS=[
{id:1,title:"第一關：禮物炸彈，恭喜入職",bg:"bg1",scene:"🎁",
text:"恭喜你通過司法特考！國考排名第三，媽媽在里民大會公告欄貼了你的榜單，附上手寫「吾兒為官，光宗耀祖」。\n\n第一天上班，辦公室桌上已堆了四個禮盒。\n\n📦 禮盒一：燙金名片夾紅包「范法官惠存，小女兒案子勞煩多關照」——五張千元大鈔\n🍵 禮盒二：知名律師事務所「頂級台灣高山茶禮盒」，市價兩萬八\n🥩 禮盒三：日本A5和牛一整箱（物流追蹤顯示已常溫放三小時）\n🍷 禮盒四：法國波爾多頂級紅酒兩瓶，酒標看起來就是「很貴」\n\n書記官老王探頭壓低聲音：「法官，這是行規啦，大家都這樣…不收反而奇怪喔。」",
choices:[
{label:"A",text:"🤔 收茶葉，和牛退回，紅包和紅酒婉拒",tone:"bad",emoji:"😬",delta:{score:-20,hp:-5,guanxi:10,pending:0},result:"你的「有選擇性廉潔」震驚了老王。律師圈流傳：「新來那個范法官，只收茶不收錢，搞不懂。」媽媽打電話來：「收別人東西要還人情！我就說你讀書讀呆了…」\n\n📱 PTT帳號收到私訊：「法官大人，下次換什麼比較好收？」\n你：？？？",article:"第八條白話文：跟你案子有關係的人送的東西，不管是紅包、茶葉、和牛還是「好意」，通通不能收！「部分廉潔」不算廉潔。",articleNum:"第八條"},
{label:"B",text:"⚖️ 全部退回，當天填單通報院長，並請老王作見證",tone:"good",emoji:"⚖️",delta:{score:5,hp:-10,guanxi:-15,pending:0},result:"你義正言辭，全數退回，認真填了通報表。院長說「好孩子，有前途」，轉頭跟秘書說「幫我把這個菜鳥調到最難搞的庭。」\n\n老王：「法官，那箱和牛已經退冰了，浪費了喔。」\n\n✅ 考績安全！",article:"第八條正確示範！全部退回 + 通報，一氣呵成。第八條第三項還要求你的家人也要遵守。",articleNum:"第八條"},
{label:"C",text:"📱 偷偷叫對方來拿走，不留任何書面紀錄",tone:"bad",emoji:"📱",delta:{score:-10,hp:0,guanxi:-20,pending:5},result:"你覺得這樣最乾淨——沒有文件，完美消滅。\n\n但老王已把每個細節以Podcast訪談的口氣，講給整棟法院的人聽了。\n\n三樓清潔阿姨：「那和牛最後怎樣了？」老王嘆氣：「退冰了，浪費啊。」\n\n📊 對造當事人聽說「有律師去看望法官」，當天聲請迴避。案子炸了。",article:"第八條 + 第二十六條：私下解決不等於沒發生。正確做法是通報，讓程序說話。",articleNum:"第八條、第二十六條"},
]},
{id:2,title:"第二關：傳說中的「人形跳針機」",bg:"bg2",scene:"🔁",
text:"開庭第三天，你人生中最難忘的當事人出現了。\n\n陳天賜先生，67歲，退休公務員，離婚訴訟原告。\n\n📁 他帶來了工程用資料夾，目錄第一頁：「陳天賜陳述集（民國85年至今）」，厚達四公分。\n\n他已在庭上把「她不是好女人」重複了整整27次。書記官在做第28個正字。對造律師白眼翻過去、盯著天花板，數著日光燈的管數。\n\n你的午餐外送三十分鐘前就到了，正在冷掉。後面還有8件案子在等。",
choices:[
{label:"A",text:"😤 「好了！陳先生，這部分已記明筆錄，我們進入下一爭點。」（打斷）",tone:"bad",emoji:"😤",delta:{score:-15,hp:5,guanxi:-10,pending:-5},result:"陳天賜先生愣了三秒，然後當庭崩潰大哭。\n\n「法官你不讓我說話！這是我28年的委屈！」\n\n當天下午他在司法院臉書留言被分享218次，留言區：「法院黑暗」。\n\n你的外送終於可以吃了，還是冷的。\n😐 後面8件案子的當事人：謝謝法官。",article:"第十二條：法官應耐心、有禮聽審，維護當事人訴訟上權利，不得有損其尊嚴。",articleNum:"第十二條"},
{label:"B",text:"🙏 深呼吸，耐心聽完，溫柔引導他說「法律上的爭點」",tone:"neutral",emoji:"🙏",delta:{score:5,hp:-20,guanxi:20,pending:20},result:"你召喚了體內的聖人模式。陳先生感動熱淚盈眶：「法官，你是第一個真的在聽我說話的人！」然後又講了45分鐘。\n\n🕕 今天排的8件案子全數延期，7位律師在外面此起彼落地嘆氣。\n\n你的便當已冷到可以結晶了。📈 未結案點數：大幅上升。",article:"第十二條做到了，但第十一條說：妥速執行職務，不得無故延滯。這兩條永遠在打架。",articleNum:"第十一條、第十二條"},
{label:"C",text:"☕ 宣布休庭15分鐘，請書記官老王出去「安撫一下」",tone:"neutral",emoji:"☕",delta:{score:0,hp:-10,guanxi:5,pending:10},result:"老王一臉「我薪水沒有這麼多」的表情走出去。\n\n15分鐘後老王回來，臉色慘白：「法官，陳先生說我們是同一掛的，還問我要不要看他87年的另一本資料夾。」\n\n⏱️ 休庭變成40分鐘。行李箱裡還有「資料夾B」虎視眈眈。",article:"第十三條：法官對受其監督之法院人員，應要求依法執行職務。老王是人，不是盾牌。",articleNum:"第十三條"},
]},
{id:3,title:"第三關：家族群組的午夜奇襲",bg:"bg3",scene:"📲",
text:"深夜11:47，你剛用Word存好7,000字的判決書草稿（存檔三次，深怕斷電），準備去洗澡睡覺。\n\n📳 LINE震動。家族群組「陳家大家庭🏠一起加油💪」。\n\n🧓 舅舅：「我姪子在法院工作對不對？我朋友的女兒被告，攤販糾紛，你幫忙『關心一下』好嗎」\n👩 媽媽：「趕快回你舅舅！！他等你」\n👵 阿姨：「對啊你那麼厲害幫個小忙嘛」\n🧓‍♂️ 舅公：「[轉傳][轉傳][轉傳][轉傳][轉傳][轉傳][轉傳][轉傳][轉傳]」\n\n你已讀。群組立刻出現：👁️👁️👁️👁️👁️（全員已讀回執）\n\n媽媽私訊：「你怎麼看了不回！！很忙嗎你！！」",
choices:[
{label:"A",text:"🙈 手機放下，假裝睡著了，明天再說",tone:"neutral",emoji:"🙈",delta:{score:5,hp:-25,guanxi:-15,pending:0},result:"你關掉螢幕，蓋上棉被。\n\n手機：震動。震動。震動。震動。震動（×47）\n\n媽媽隔天清晨6:02來電，歷時52分鐘：「你學法律到底是為了什麼」。\n\n✅ 但你沒有違規。法官帽子還在頭上。",article:"第七條：法官對於他人承辦之案件，不得關說或請託。不回是痛苦的，但正確的。",articleNum:"第七條"},
{label:"B",text:"📋 回覆：「舅舅，職務上不能介入個別案件，請去法律扶助基金會（412-88995）」",tone:"good",emoji:"📋",delta:{score:10,hp:-10,guanxi:-5,pending:0},result:"你用最溫柔的語氣打出最專業的回覆。\n\n舅舅：「哦這樣哦，好啦」\n媽媽：「你越來越不近人情了」\n阿姨：「我就說讀太多書就這樣」\n舅公：「[轉傳一個養生影片]」\n\n✅ 考績無損。法律扶助基金會那頭，有人接起電話。",article:"第七條精神：拒絕關說，同時指引正當途徑。「有溫度的拒絕」。",articleNum:"第七條"},
{label:"C",text:"📞 打電話給舅舅，「了解一下情況，看有沒有辦法幫忙」",tone:"bad",emoji:"⚠️",delta:{score:-30,hp:5,guanxi:25,pending:15},result:"舅舅大喜：「哎呀我就說我姪子最靠譜！」\n\n接下來三個月，每週至少兩件「小忙」——表妹超速罰單、王叔勞資糾紛、遠親債務案子⋯⋯\n\n你已建立了一個家族法律諮詢所，服務費：你的職業生涯。\n\n⚠️ 這條路回不了頭了。",article:"第七條紅線！第六條：不得利用職務為自己或他人謀取不當利益——就算對方是你舅舅。",articleNum:"第六條、第七條"},
]},
{id:4,title:"第四關：五萬塊的政治誘惑",bg:"bg4",scene:"🎙️",
text:"某黨立委辦公室打來電話：「范法官您好！我們黨青年部主辦一個『司法改革論壇』，非常希望邀請您擔任與談人——純學術喔，不碰政治的！」\n\n你打開活動頁面：\n📋 主辦：某某黨青年部\n📍 地點：某某黨部二樓會議廳\n🎤 其他與談人：某某黨司法政策顧問（前立委）\n💰 演講費：新台幣五萬元整\n\n同事小林法官（已有三個精品錶）：「去啊！五萬耶！而且上電視有曝光！」\n\n學長陳法官靠過來，只說四個字：「你確定嗎？」",
choices:[
{label:"A",text:"📝 接受，告知對方「我只講中立法律觀點，不涉任何黨派立場」",tone:"bad",emoji:"📸",delta:{score:-25,hp:-15,guanxi:10,pending:0},result:"你說了非常中立、非常學術的話。\n\n但主辦單位把你放在大型黨旗前方，搭配激昂競選音樂，字幕：「連法官都支持我們的司法政策！」\n\n影片在IG累積三萬次觀看。PTT八卦版：「法官站台爭議！」\n\n院長把你叫進去談了四十分鐘，全程沒有笑聲。",article:"第二十一條：法官於任職期間不得公開為政黨或政治組織發言演說。外觀跟實質一樣重要。",articleNum:"第二十一條"},
{label:"B",text:"✋ 婉拒，說明「法官身份不宜出席黨部主辦之活動」",tone:"good",emoji:"✋",delta:{score:15,hp:5,guanxi:-10,pending:0},result:"你說了No。\n\n立委辦公室：「啊…好，謝謝您，掰掰。」\n小林法官：「你傻了吧，五萬耶！」\n陳法官豎起大拇指：「你會活得比較久。」\n\n那天晚上你睡了這份工作以來最好的一覺。\n🌙 夢裡沒有黨旗，只有一片安靜的星空。",article:"第二十一條 + 第十八條雙達標！睡得著覺，是最好的報酬。",articleNum:"第十八條、第二十一條"},
{label:"C",text:"🤯 叫助理去代為出席，錢存到助理帳戶",tone:"bad",emoji:"🤦",delta:{score:-35,hp:-10,guanxi:-20,pending:0},result:"這個神來之筆讓你同時達成：\n🔴 指示他人代為從事政治活動（第二十一條）\n🔴 利用職務協助他人取得不當利益（第六條）\n🔴 讓助理對你產生不可言說的人生把柄\n\n陳法官遠遠搖了搖頭：「我二十年沒見過這種神操作。」",article:"第二十一條第二項：法官不得指示受其監督之人員代為從事政治活動。",articleNum:"第二十一條"},
]},
{id:5,title:"第五關：下午三點的奇怪來訪",bg:"bg5",scene:"🚪",
text:"你正在審一個土地糾紛案，原告是財團，被告是一群老農民，涉及金額八億。\n\n下午三點整，書記官老王剛出去買珍珠奶茶。\n\n辦公室門口出現一個穿著筆挺的中年男性，是原告的代理律師——業界知名大型事務所合夥人。\n\n他面帶微笑：「范法官，您好！我路過，想順便確認一下下次開庭時間，另外也帶了點小小心意——是我們事務所剛從日本帶回來的伴手禮，大家分著吃的那種。」\n\n他站在門口。老王不在。只有你。",
choices:[
{label:"A",text:"😅 「請進！開庭日期查一下，禮物先放這裡等老王回來再退。」",tone:"bad",emoji:"💣",delta:{score:-30,hp:-20,guanxi:0,pending:20},result:"律師進來了，坐下了，喝了你桌上的礦泉水，聊了二十分鐘，話題慢慢滑向「您覺得這個案子的方向大概…」\n\n老王拿著珍珠奶茶回來，珍珠奶茶差點掉地上。\n\n隔天對造律師聲請法官迴避。\n\n📂 案子：炸了。",article:"第十五條核心：除法定例外，法官不得僅與一方當事人或其關係人單獨溝通、會面。",articleNum:"第十五條"},
{label:"B",text:"📞 「請在走廊稍等，我打電話請書記官回來，三方一起確認。」",tone:"good",emoji:"📞",delta:{score:10,hp:0,guanxi:0,pending:0},result:"律師說：「好，沒問題。」\n\n老王以百米衝刺速度跑回來，珍珠奶茶沒了（在路上喝完了）。\n\n三方確認開庭日期。伴手禮：依規定退回（裡面是麻糬，老王看起來有點難過）。\n\n✅ 全程乾淨透明。老王私下說：「法官，謝謝你保護我。」",article:"第十五條完美體現！避免單方接觸的最好辦法，就是讓第三方在場。",articleNum:"第十五條"},
{label:"C",text:"🧊 在門口直接說：「開庭日期請查系統，禮物請帶回，這樣的拜訪我無法接受。」",tone:"good",emoji:"🧊",delta:{score:5,hp:-5,guanxi:-15,pending:0},result:"律師愣了整整五秒，說「好，抱歉打擾了」，轉身離去。\n\n你關上辦公室的門，心跳大概150下，手有點抖，但很平靜。\n\n老王回來後說：「法官，你知道那是麻糬嗎⋯⋯開玩笑的。做得好。」",article:"第十五條 + 第八條同時合規！雖然代價是錯過了麻糬。",articleNum:"第八條、第十五條"},
]},
{id:6,title:"第六關：劉法官的秘密與你的良心",bg:"bg6",scene:"🔍",
text:"你無意間發現了一件事。\n\n你的同事劉法官（資深、和藹、每年法官節都請全辦公室吃火鍋）最近在審一個知名商人的金融詐欺案。\n\n但你同學——恰好是那個商人對造方的律師——傳來幾張照片：劉法官在那個商人的私人高爾夫俱樂部，笑容燦爛，出現了三次。\n\n「我就是讓你知道一下，你自己看著辦。」同學說完就沒有下文了。\n\n劉法官上個月才幫你介紹了一個超好的中古車管道，省了八萬塊。他的太太最近在住院，壓力很大。",
choices:[
{label:"A",text:"🙈 假裝沒看到，這是照片不是鐵證，可能有誤會",tone:"bad",emoji:"🙅",delta:{score:-20,hp:-10,guanxi:5,pending:0},result:"你把照片存進手機最深處，繼續上班。\n\n三個月後，劉法官案爆發。記者問：「您當時知道嗎？」\n\n你沉默了三秒，那三秒被鏡頭捕捉，剪成0.75秒的動圖，在網路上傳了兩萬次。\n\n標題：「法院黑幕？同僚隱匿疑點！」",article:"第二十六條明文：知悉其他法官確有違反倫理規範之行為，應通知職務監督權人。沉默不是選項。",articleNum:"第二十六條"},
{label:"B",text:"📣 向院長室通報，提供照片及我所知的情況",tone:"good",emoji:"📣",delta:{score:15,hp:-20,guanxi:-30,pending:0},result:"你花了三十分鐘考慮，然後去了院長室。\n\n劉法官後來知道是你。那雙幫過你的手，在走廊擦肩而過時，只是收緊了一下。\n\n你沒有再收到火鍋的邀請。\n\n但你照照鏡子，認識裡面的那個人。\n✅ 司法的信譽，比一頓火鍋重要。",article:"第二十六條設立的原因就在這裡：司法公信力是集體的。通報不是背叛，是最深的尊重。",articleNum:"第二十六條"},
{label:"C",text:"🤫 私下找劉法官，給他機會自首或解釋",tone:"bad",emoji:"😰",delta:{score:-10,hp:-15,guanxi:-10,pending:5},result:"你約了劉法官喝咖啡，把照片推到他面前。\n\n劉法官說：「謝謝你告訴我，我會處理的。」然後什麼都沒有發生。\n\n兩週後他暗示「你拿著這個來找我，這件事本身就很有趣」。\n\n你忽然意識到，有把柄在對方手上的，好像是你。",article:"第二十六條要求通報職務監督權人，不是私下交涉。私下處理可能讓自己陷入共謀嫌疑。",articleNum:"第二十六條"},
]},
{id:7,title:"第七關：熱搜第一名的審判",bg:"bg7",scene:"🔥",
text:"你接到了這輩子最高調的案子：知名男藝人性騷擾訴訟。\n\n法院外從早上七點就有人守著。三台攝影機。兩個直播主。一個大媽拿著「還我公道」的紙板。\n\n📱 你的高中同學（科技業PM，天天追Netflix）在群組發問：「欸！是你在審嗎？說真的你覺得他有沒有罪？我們不說出去的啦哈哈哈」\n\n📞 下午一家媒體記者打來：「范法官，想跟您做個『非正式的』背景說明，不會用到您名字的…」\n\n你的法袍袖子上有一個小墨水漬，你盯著它看了五秒。",
choices:[

  if(s.score<=0)return"scoreZero";
  if(s.hp<=0)return"hpZero";
  if(s.guanxi<=0)return"guanxiZero";
  if(s.pending>=100)return"pendingMax";

    document.getElementById("restartBtn").onclick=()=>{
      s.phase="title";s.chapter=0;s.stats={score:100,hp:100,guanxi:50,pending:0};
      s.lastChoice=null;s.endingKey=null;s.playerName="";s.nameVal="";s.confirmClear=false;
      window.scrollTo(0,0);render();
    };
    return;
  }

  // story or result
  const statBar=(icon,label,val,max,colorStyle,isLow)=>`
<div class="stat-row">
  <div class="stat-label">
    <span>${icon} ${label}</span>
    <span class="stat-val${isLow?" low":""}">${val}</span>
  </div>
  <div class="bar-bg"><div class="bar-fill" style="width:${Math.min(100,Math.max(0,(val/max)*100))}%;${colorStyle}"></div></div>
</div>`;

  const st=s.stats;
  app.className=BG_CLASSES[s.chapter]||"bg1";
  app.innerHTML=`
<div class="stats-wrap">
  <div class="stats-header">
    <div style="display:flex;align-items:center;gap:10px">
      <div class="stats-title">⚖ 修仙退休路</div>
      ${s.playerName?`<div class="player-badge">👤 ${s.playerName}</div>`:""}
    </div>
    <button class="mute-btn" id="muteBtn">${s.muted?"🔇":"🔊"}</button>
  </div>
  <div class="stats-grid">
    ${statBar("⚖️","考績值",st.score,100,"background:linear-gradient(90deg,#eab308,#f59e0b)",st.score<25)}
    ${statBar("❤️","血量",st.hp,100,"background:linear-gradient(90deg,#ef4444,#f87171)",st.hp<25)}
    ${statBar("🍗","人情羈絆",st.guanxi,100,"background:linear-gradient(90deg,#10b981,#34d399)",st.guanxi<25)}
    ${statBar("⏰","未結案點數",st.pending,100,"background:linear-gradient(90deg,#ea580c,#ef4444)",st.pending>75)}
  </div>
</div>
<div class="main">
  <div class="chap-header">
    <div class="chap-scene">${cur.scene}</div>
    <div>
      <div class="chap-num">第 ${s.chapter+1} / ${CHAPTERS.length} 關</div>
      <div class="chap-title">${cur.title}</div>
    </div>
  </div>

  <div class="story-box" id="storyBox">
    ${s.phase==="story"?cur.text.replace(/\n/g,"
"):
    s.lastChoice?`
<div class="result-row">
  <div class="result-emoji">${s.lastChoice.emoji}</div>
  <div class="result-text">${s.lastChoice.result.replace(/\n/g,"
")}</div>
</div>
<div class="delta-wrap" id="deltaWrap"></div>
<div class="law-box">
  <div class="law-title">📜 《法官倫理規範》${s.lastChoice.articleNum}</div>
  <div class="law-text">${s.lastChoice.article}</div>
</div>`:""}
  </div>

  ${s.phase==="story"?`
<div class="choices" id="choices">
  ${cur.choices.map((c,i)=>`
  <button class="choice-btn" data-idx="${i}">
    <span class="choice-label">${c.label}</span>
    <span>${c.text}</span>
  </button>`).join("")}
</div>`:`
<button class="next-btn" id="nextBtn">
  ${s.chapter<CHAPTERS.length-1?"繼續修仙之路 →":"迎向命運的終點…"}
</button>`}

  <div style="text-align:center;padding:16px 0;font-size:13px;color:#44403c;font-family:monospace">based on 《法官倫理規範》中華民國101年1月6日施行</div>
</div>`;

  document.getElementById("muteBtn").onclick=()=>{s.muted=toggleMute();document.getElementById("muteBtn").textContent=s.muted?"🔇":"🔊";};

  if(s.phase==="result"&&s.lastChoice){
    const dw=document.getElementById("deltaWrap");
    const labels={score:"⚖️考績",hp:"❤️血量",guanxi:"🍗人情",pending:"⏰未結案"};
    Object.entries(s.lastChoice.delta).forEach(([k,v])=>{
      if(!v)return;
      const chip=document.createElement("div");
      chip.className="delta-chip "+(v>0?"delta-pos":"delta-neg");
      chip.textContent=`${labels[k]} ${v>0?"+":""}${v}`;
      dw.appendChild(chip);
    });
  }

  if(s.phase==="story"){
    document.querySelectorAll(".choice-btn").forEach(btn=>{
      btn.onclick=()=>{
        const idx=parseInt(btn.dataset.idx);
        const choice=cur.choices[idx];
        sfxClick();
        // Apply delta
        const ns={...s.stats};
        Object.entries(choice.delta).forEach(([k,v])=>{
          if(k==="guanxi")ns[k]=Math.min(100,Math.max(0,ns[k]+v));
          else if(k==="pending")ns[k]=Math.min(100,Math.max(0,ns[k]+v));
          else ns[k]=Math.min(120,Math.max(0,ns[k]+v));
        });
        s.stats=ns;
        s.lastChoice=choice;
        s.phase="result";
        window.scrollTo(0,0);
        setTimeout(()=>{if(choice.tone==="good")sfxGood();else if(choice.tone==="bad")sfxBad();},200);
        // Check stat endings
        const statEnd=checkEnding(ns);
        if(statEnd){
          setTimeout(()=>{sfxEnding(false);saveRecord({name:s.playerName,ending:statEnd,time:fmtTime()});s.endingKey=statEnd;s.phase="ending";render();},2800);
        }else if(choice.isEnding){
          const et=choice.endingType;
          setTimeout(()=>{
            sfxEnding(et==="good");
            saveRecord({name:s.playerName,ending:et,time:fmtTime()});
            s.endingKey=et;s.phase="ending";render();
          },2800);
        }
        render();
      };
    });
  }

  if(s.phase==="result"){
    const nextBtn=document.getElementById("nextBtn");
    if(nextBtn)nextBtn.onclick=()=>{
      if(s.chapter<CHAPTERS.length-1){
        sfxNext();s.chapter++;s.phase="story";s.lastChoice=null;
        window.scrollTo(0,0);render();
      }else if(s.lastChoice&&s.lastChoice.isEnding){
        const et=s.lastChoice.endingType;
        sfxEnding(et==="good");
        saveRecord({name:s.playerName,ending:et,time:fmtTime()});
        s.endingKey=et;s.phase="ending";render();
      }
    };
  }
}

// Boot
window.onload=()=>{
  document.getElementById("loading").style.display="none";
  document.getElementById("app").style.display="block";
  render();
};
</script>

</body>
</html>
